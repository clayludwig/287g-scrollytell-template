<!--
  BLOCK: IMAGE - INLINE
  Image contained within the body-text column width.
  Use when the image is supporting evidence rather than a scene-setter.
-->
<section class="block block-image-inline" data-scroll="fade-up">
  <div class="text-inner">
    <div class="image-container">
      <!-- Replace this placeholder with: <img src="assets/photo.jpg" alt="Description"> -->
      <div class="image-placeholder">
        <span>Inline image</span>
        <span class="placeholder-hint">Photo, map, or document image</span>
      </div>
    </div>
    <div class="image-caption">
      <p>Caption text goes here. <span class="credit">Photo credit</span></p>
    </div>
  </div>
</section>
