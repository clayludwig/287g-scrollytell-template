<!--
  BLOCK: HERO
  Full-viewport opening title card.
  - Add a background image via CSS (.block-hero { background-image: ... })
    or drop an absolutely-positioned <img> inside this section.
  - The .hero-overlay sits above the background and below the .hero-content,
    keeping headline copy legible on busy imagery.
  - Drop the .scroll-indicator if you don't want the cue.
-->
<section class="block block-hero" id="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-kicker">Section Kicker</p>
    <h1 class="hero-headline">Lorem Ipsum Dolor</h1>
    <p class="hero-subhead">Sit amet consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
    <p class="hero-byline">By Author Name</p>
    <p class="hero-byline">Designed by Designer Name</p>
    <p class="hero-date">Month 2026</p>
    <div class="scroll-indicator">
      <div class="scroll-arrow"></div>
    </div>
  </div>
</section>
