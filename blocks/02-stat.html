<!--
  BLOCK: BIG NUMBER / STAT
  A striking single data point centered on its own block. Use to
  punctuate the narrative — typically once or twice per story, not
  more, otherwise the impact wears off.

  Anatomy:
  - .stat-number      — the big number (use accent color, large weight)
  - .stat-label       — one-sentence label, plain English
  - .stat-source      — small caps source line
  - <strong> inside .stat-label highlights the most important phrase
-->
<section class="block block-stat" data-scroll="fade-up">
  <div class="stat-inner">
    <span class="stat-number">~20%</span>
    <span class="stat-label">of lorem ipsum dolor sit amet, consectetur adipiscing elit -- <strong>sed do eiusmod tempor</strong></span>
    <span class="stat-source">Source: Lorem ipsum data</span>
  </div>
</section>
