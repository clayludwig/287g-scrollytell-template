<!--
  BLOCK: IMAGE - FULL WIDTH
  Full-bleed image (or near-full-bleed up to 1200px) with optional caption.
  Replace .image-placeholder with <img src="..." alt="...">.

  Caption is constrained to the body-text column width and
  uses a sans-serif, dim color so it doesn't compete with prose.
-->
<section class="block block-image-full" data-scroll="fade">
  <div class="image-container">
    <!-- Replace this placeholder with: <img src="assets/photo.jpg" alt="Description"> -->
    <div class="image-placeholder">
      <span>Full-width image</span>
      <span class="placeholder-hint">Replace with photo, illustration, or scene-setter</span>
    </div>
  </div>
  <div class="image-caption">
    <p>Caption text goes here. <span class="credit">Photo credit</span></p>
  </div>
</section>
